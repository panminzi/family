services:
  postgres:
    image: postgres:16-alpine
    container_name: cartoon-family-postgres
    environment:
      POSTGRES_USER: family
      POSTGRES_PASSWORD: family
      POSTGRES_DB: family
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "family"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    container_name: cartoon-family-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://family:family@postgres:5432/family?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-gpt-4o-mini}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-dall-e-3}
      ENABLE_SCHEDULER: "1"
      CRON_BREAKFAST: "30 7 * * *"
      CRON_LUNCH: "0 12 * * *"
      CRON_DINNER: "30 18 * * *"
      UPLOADS_DIR: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - server_uploads:/app/uploads

  frontend:
    build: ./family-frontend
    container_name: cartoon-family-frontend
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  postgres_data:
  server_uploads:
